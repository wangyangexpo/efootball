services:
  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always

  mysql:
    image: mysql:8.0
    container_name: demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE --innodb-buffer-pool-size=128M --max-connections=50
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  app:
    image: ${APP_IMAGE}:${VERSION:-latest}
    container_name: demo-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASS: ${MYSQL_ROOT_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  umami:
    image: umamisoftware/umami:mysql-latest
    container_name: umami
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: mysql://${DB_USER}:${MYSQL_ROOT_PASSWORD}@mysql:3306/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - mysql
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

volumes:
  mysql_data:
